version: 2

updates:
  - package-ecosystem: "nuget"
    directories:
      - "/src/*"

    schedule:
      interval: "daily"
      time: "08:00"
      timezone: "Europe/Sofia"

    commit-message:
      prefix: "fix: "

    allow:
      # All packages may receive patch and minor updates.
      # The ignore rules below block minor updates for internal packages.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"

    ignore:
      # Internal packages: patch updates only.
      - dependency-name: "1nception*"
        update-types:
          - "version-update:semver-minor"

      - dependency-name: "one*"
        update-types:
          - "version-update:semver-minor"

      - dependency-name: "sett1x*"
        update-types:
          - "version-update:semver-minor"

      # Never create major version update PRs.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

    groups:
      inception-patches:
        applies-to: version-updates
        patterns:
          - "1nception*"
        update-types:
          - "patch"

      one-patches:
        applies-to: version-updates
        patterns:
          - "one*"
        update-types:
          - "patch"

      sett1x-patches:
        applies-to: version-updates
        patterns:
          - "sett1x*"
        update-types:
          - "patch"

      all-other-nuget-updates:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "1nception*"
          - "one*"
          - "sett1x*"
        update-types:
          - "patch"
          - "minor"

    rebase-strategy: "auto"